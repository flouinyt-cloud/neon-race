<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NeonRace | Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00e676; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
        header { background: #1a1a1a; padding: 15px 5%; display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); }
        .btn { background: var(--primary); color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid var(--primary); padding: 20px; border-radius: 15px; display: none; z-index: 1000; width: 400px; }
        #chatBox { height: 200px; overflow-y: auto; background: #111; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .my-msg { align-self: flex-end; background: var(--primary); color: black; padding: 5px 10px; border-radius: 8px; }
        .other-msg { align-self: flex-start; background: #444; padding: 5px 10px; border-radius: 8px; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; z-index:999; }
    </style>
</head>
<body>

<div id="overlay" onclick="closeModals()"></div>

<header>
    <h2 style="color:var(--primary)">NEON RACE</h2>
    <div id="authBox">
        <input type="text" id="u" placeholder="Ник"> <input type="password" id="p" placeholder="Пароль">
        <button class="btn" onclick="auth('login')">Вход</button>
        <button class="btn" onclick="auth('register')" style="background:#444;color:white">Рег</button>
    </div>
    <div id="userBox" style="display:none">
        <b id="username"></b> 
        <button class="btn" onclick="openModal('profile')">📩</button>
        <button class="btn" onclick="logout()" style="background:red">Выход</button>
    </div>
</header>

<div class="container">
    <div id="sellBox" style="display:none; background:var(--card); padding:20px; border-radius:15px; margin-bottom:20px;">
        <input type="text" id="iName" placeholder="Товар"> <input type="number" id="iPrice" placeholder="Цена">
        <button class="btn" onclick="sell()">Выставить</button>
    </div>
    <div class="grid" id="items"></div>
</div>

<div id="profile" class="modal">
    <h3>Входящие</h3>
    <div id="inbox"></div>
    <button class="btn" onclick="closeModals()">Закрыть</button>
</div>

<div id="chat" class="modal">
    <h3 id="chatWith"></h3>
    <div id="chatBox"></div>
    <input type="text" id="mIn" style="width:70%"> <button class="btn" onclick="send()">➤</button>
</div>

<script>
    // ГЛАВНОЕ ИЗМЕНЕНИЕ ТУТ:
    const API = 'https://neon-race.onrender.com/api';
    let user = localStorage.getItem('user');
    let chatTarget = null;

    async function auth(t) {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        const res = await fetch(`${API}/${t}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user: u, pass: p})
        });
        if(res.ok && t === 'login') { localStorage.setItem('user', u); location.reload(); }
        else if(res.ok) alert("Готово! Войди.");
    }

    function logout() { localStorage.removeItem('user'); location.reload(); }

    async function load() {
        const res = await fetch(`${API}/items`);
        const data = await res.json();
        document.getElementById('items').innerHTML = data.map(i => `
            <div class="item-card">
                <h3>${i.name}</h3>
                <p>Продавец: ${i.seller}</p>
                <b style="color:var(--primary)">${i.price} Robux</b><br><br>
                ${i.seller === user || user === 'Admin' ? 
                    `<button class="btn" style="background:red" onclick="del(${i.id})">Удалить</button>` :
                    `<button class="btn" onclick="openChat('${i.seller}')">Написать</button>`
                }
            </div>
        `).join('');
    }

    async function sell() {
        const n = document.getElementById('iName').value, p = document.getElementById('iPrice').value;
        await fetch(`${API}/sell`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: n, price: p, seller: user})
        });
        location.reload();
    }

    async function del(id) {
        await fetch(`${API}/items/${id}`, {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user: user})
        });
        load();
    }

    async function openChat(target) {
        chatTarget = target;
        document.getElementById('chatWith').innerText = target;
        openModal('chat');
        updateChat();
    }

    async function updateChat() {
        if(!chatTarget) return;
        const res = await fetch(`${API}/messages/${user}/${chatTarget}`);
        const msgs = await res.json();
        document.getElementById('chatBox').innerHTML = msgs.map(m => 
            `<div class="${m.from === user ? 'my-msg' : 'other-msg'}">${m.text}</div>`
        ).join('');
    }

    async function send() {
        const t = document.getElementById('mIn').value;
        await fetch(`${API}/messages`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({from: user, to: chatTarget, text: t})
        });
        document.getElementById('mIn').value = '';
        updateChat();
    }

    async function loadInbox() {
        const res = await fetch(`${API}/my-inbox/${user}`);
        const data = await res.json();
        document.getElementById('inbox').innerHTML = data.map(m => `
            <div style="background:#333; padding:5px; margin:5px;">
                <b>${m.from}:</b> ${m.text} <button onclick="openChat('${m.from}')">Ответить</button>
            </div>
        `).join('');
    }

    function openModal(id) { 
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
        if(id === 'profile') loadInbox();
    }

    function closeModals() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('profile').style.display = 'none';
        document.getElementById('chat').style.display = 'none';
        chatTarget = null;
    }

    if(user) {
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('userBox').style.display = 'block';
        document.getElementById('username').innerText = user;
        document.getElementById('sellBox').style.display = 'block';
    }
    load();
    setInterval(updateChat, 3000);
</script>
</body>
</html>
